services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: grisk
      POSTGRES_USER: grisk
      POSTGRES_PASSWORD: grisk123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grisk -d grisk"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://grisk:grisk123@db:5432/grisk
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src:ro

  frontend:
    build: ./grisk
    restart: unless-stopped
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - WDS_SOCKET_PORT=0
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./grisk/src:/app/src
      - ./grisk/public:/app/public
    stdin_open: true

volumes:
  pgdata:
